# release-plz config. See https://release-plz.dev/docs/config.

[workspace]
# We're a 0.0.x crate — `cargo-semver-checks` produces too much noise on a
# pre-1.0 surface. Re-enable when we cut 0.1.0.
semver_check = false

# Generate / append to CHANGELOG.md from Conventional Commits.
changelog_update = true

# Don't publish to crates.io yet. `Cargo.toml` has `publish = false` which
# already blocks this; setting it explicitly here means future flips are a
# single-place change. To enable crates.io:
#   1. flip `publish = true` (or remove it) in Cargo.toml
#   2. set `publish = true` here
#   3. uncomment `CARGO_REGISTRY_TOKEN` in .github/workflows/release.yml
publish = false

# Always create a GitHub release alongside the tag, with the changelog excerpt
# as the body. Free even on private repos.
git_release_enable = true
git_tag_enable = true
