name: Release

# Drives the release process via release-plz (https://release-plz.dev/).
#
# Two jobs run on every push to `main`:
#
#   1. `release-pr` — looks at commits since the last release, opens (or updates)
#      a single "Release" PR that bumps `Cargo.toml`'s version and updates
#      `CHANGELOG.md` according to Conventional Commits. Merging that PR back
#      into `main` is what officially cuts a release.
#
#   2. `release` — when the merge of a release PR lands on `main`, this job
#      detects the version bump in `Cargo.toml`, creates the matching git tag,
#      and creates a GitHub release with the new changelog section.
#
# crates.io publishing is currently disabled because `Cargo.toml` has
# `publish = false`. To enable it later:
#   - flip `publish = true` (or remove the line) in `Cargo.toml`,
#   - add a `CARGO_REGISTRY_TOKEN` repository secret,
#   - uncomment the `CARGO_REGISTRY_TOKEN` env var on the `release` job below.
#
# All third-party actions are pinned to immutable commit SHAs per
# https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions.

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

# Only one release run at a time so the release PR doesn't race with itself.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-pr:
    name: Open / update release PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'raindrop-ai' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run release-plz (release-pr)
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Tag + GitHub release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'raindrop-ai' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run release-plz (release)
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
