name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  # NOTE: We intentionally do NOT set `RUSTFLAGS: -D warnings` globally because that would
  # promote warnings in transitive dependencies to errors and turn unrelated upstream churn
  # into CI failures. Warnings-as-errors is enforced for our own crate via:
  #   - `cargo clippy ... -- -D warnings` (lib + tests + examples)
  #   - `RUSTDOCFLAGS=-D warnings cargo doc` (rustdoc-only, doesn't touch deps)
  RUSTDOCFLAGS: -D warnings

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Build (all targets, all features)
        run: cargo build --all-targets --all-features --verbose
      - name: Run clippy (all targets, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --all-features --verbose
      - name: Build docs
        run: cargo doc --no-deps --all-features

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Build with MSRV
        run: cargo build --all-features --verbose

  features:
    name: Feature combinations
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "rustls-tls"
          - "native-tls"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build with ${{ matrix.features }}
        run: cargo build --no-default-features --features ${{ matrix.features }} --verbose
      - name: Test with ${{ matrix.features }}
        run: cargo test --no-default-features --features ${{ matrix.features }}
