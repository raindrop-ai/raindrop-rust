name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  # NOTE: We intentionally do NOT set `RUSTFLAGS: -D warnings` globally because that would
  # promote warnings in transitive dependencies to errors and turn unrelated upstream churn
  # into CI failures. Warnings-as-errors is enforced for our own crate via:
  #   - `cargo clippy ... -- -D warnings` (lib + tests + examples)
  #   - `RUSTDOCFLAGS=-D warnings cargo doc` (rustdoc-only, doesn't touch deps)
  RUSTDOCFLAGS: -D warnings

# All third-party actions below are pinned to immutable commit SHAs (per
# https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
# §"Using third-party actions"). The `# v…` comment after each SHA records the human-readable
# release the SHA points to, so dependency updates remain reviewable.
jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-04
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Build (all targets, all features)
        run: cargo build --all-targets --all-features --verbose
      - name: Run clippy (all targets, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings
      # Run unit tests, doc tests, and every integration test EXCEPT `tests/e2e.rs`.
      # The e2e suite hits the live Raindrop backend and requires write/dashboard tokens that
      # we don't expose to PR runs. It runs on a separate cadence (currently `release-plz` on
      # push to `main`, see `.github/workflows/release.yml`).
      #
      # `--lib` and `--doc` can't be combined in a single invocation (cargo rejects it as
      # "can't mix --doc with other target selecting options"), so we run them sequentially.
      - name: Run tests (excluding e2e)
        run: |
          cargo test --all-features --lib --verbose
          cargo test --all-features --doc --verbose
          cargo test --all-features \
            --test concurrency \
            --test events \
            --test traces \
            --test transport \
            --test wire_format \
            --verbose
      - name: Build docs
        run: cargo doc --no-deps --all-features

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # Use --locked so the MSRV check actually verifies that the committed
      # Cargo.lock is buildable on MSRV. Without this, cargo could pick newer
      # minor versions of dependencies that bump the effective MSRV and the
      # check would silently no-op.
      - name: Build with MSRV (locked)
        run: cargo build --all-features --locked --verbose

  features:
    name: Feature combinations
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "rustls-tls"
          - "native-tls"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-04
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Build with ${{ matrix.features }}
        run: cargo build --no-default-features --features ${{ matrix.features }} --verbose
      - name: Test with ${{ matrix.features }} (excluding e2e)
        run: |
          cargo test --no-default-features --features ${{ matrix.features }} --lib
          cargo test --no-default-features --features ${{ matrix.features }} --doc
          cargo test --no-default-features --features ${{ matrix.features }} \
            --test concurrency \
            --test events \
            --test traces \
            --test transport \
            --test wire_format
